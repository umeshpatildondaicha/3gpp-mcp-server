server.port=${MELODY_PORT:${PORT:3000}}
server.servlet.context-path=${MELODY_CONTEXT:/}

spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.name=3gpp-telecom-kb
spring.ai.mcp.server.version=2.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.instructions=3GPP Telecom knowledge-base MCP server
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp

app.session-ttl-ms=${SESSION_TTL_MS:1800000}
app.kb-db-path=${KB_DB_PATH:classpath:3gpp.db}


management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
 