apiVersion: apps/v1
kind: Deployment
metadata:
  name: 3gpp-mcp-server
  labels:
    app: 3gpp-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: 3gpp-mcp-server
  template:
    metadata:
      labels:
        app: 3gpp-mcp-server
    spec:
      containers:
        - name: 3gpp-mcp-server
          image: ghcr.io/umeshpatildondaicha/3gpp-mcp-server:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: SESSION_TTL_MS
              value: "1800000"
            - name: KB_DB_PATH
              value: "/home/mcpuser/.3gpp-kb/3gpp.db"
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "6Gi"
              cpu: "1000m"
          # Liveness — restart pod if server crashes
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          # Readiness — wait for DB + model load before sending traffic
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          volumeMounts:
            - name: db-cache
              mountPath: /home/mcpuser/.3gpp-kb
      volumes:
        - name: db-cache
          persistentVolumeClaim:
            claimName: 3gpp-db-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: 3gpp-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
